name: ainovel

x-json-logging: &json-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-backend-environment: &backend-environment
  APP_ENV: ${APP_ENV:-prod}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  WAIT_FOR_DB: "1"
  DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://${POSTGRES_USER:-ainovel}:${POSTGRES_PASSWORD:-ainovel}@postgres:5432/${POSTGRES_DB:-ainovel}}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
  TASK_QUEUE_BACKEND: rq
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  RQ_QUEUE_NAME: ${RQ_QUEUE_NAME:-default}
  VECTOR_CHROMA_PERSIST_DIR: /data/chroma
  DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
  DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}
  DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-30}
  DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-1800}
  AUTH_DEV_FALLBACK_USER_ID: ""
  AUTH_ADMIN_USER_ID: ${AUTH_ADMIN_USER_ID:-}
  AUTH_ADMIN_PASSWORD: ${AUTH_ADMIN_PASSWORD:-}
  AUTH_ADMIN_EMAIL: ${AUTH_ADMIN_EMAIL:-}
  AUTH_ADMIN_DISPLAY_NAME: ${AUTH_ADMIN_DISPLAY_NAME:-管理员}
  AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-lax}
  AUTH_ACTIVITY_TOUCH_INTERVAL_SECONDS: ${AUTH_ACTIVITY_TOUCH_INTERVAL_SECONDS:-30}
  AUTH_ONLINE_WINDOW_SECONDS: ${AUTH_ONLINE_WINDOW_SECONDS:-300}
  SECRET_ENCRYPTION_KEY: ${SECRET_ENCRYPTION_KEY:-}
  AUTH_SESSION_SIGNING_KEY: ${AUTH_SESSION_SIGNING_KEY:-}
  LINUXDO_OIDC_CLIENT_ID: ${LINUXDO_OIDC_CLIENT_ID:-}
  LINUXDO_OIDC_CLIENT_SECRET: ${LINUXDO_OIDC_CLIENT_SECRET:-}
  LINUXDO_OIDC_REDIRECT_URI: ${LINUXDO_OIDC_REDIRECT_URI:-}
  LINUXDO_OIDC_SCOPES: ${LINUXDO_OIDC_SCOPES:-openid profile email}

x-backend-common: &backend-common
  build:
    context: ./backend
  image: ainovel-backend:latest
  environment: *backend-environment
  volumes:
    - app_data:/data
  restart: unless-stopped
  logging: *json-logging

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ainovel}
      POSTGRES_USER: ${POSTGRES_USER:-ainovel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ainovel}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    logging: *json-logging

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    logging: *json-logging

  backend:
    <<: *backend-common
    environment:
      <<: *backend-environment
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"

  rq_worker:
    <<: *backend-common
    command: ["python", "scripts/run_rq_worker.py"]
    environment:
      <<: *backend-environment
      RQ_WORKER_PROCESSES: ${RQ_WORKER_PROCESSES:-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    image: ainovel-frontend:latest
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    restart: unless-stopped
    logging: *json-logging

volumes:
  postgres_data:
    name: ainovel_postgres_data
  app_data:
    name: ainovel_app_data
